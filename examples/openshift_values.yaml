postgresql:
  image:
    repository: bitnamilegacy/postgresql
    tag: 16.6.0-debian-12-r2
  primary:
    persistence:
      enabled: false
    podSecurityContext:
      fsGroup: 1000660001
    containerSecurityContext:
      runAsUser: 1000660001
      allowPrivilegeEscalation: false
      seccompProfile:
        type: "RuntimeDefault"

elasticsearch:
  image: "quay.io/cdis/elasticsearch"
  imageTag: "7.10.2"
  clusterName: gen3-elasticsearch
  maxUnavailable: 0
  singleNode: true
  replicas: 1
  sysctlInitContainer:
    enabled: false
  clusterHealthCheckParams: "wait_for_status=yellow&timeout=1s"
  esConfig:
    elasticsearch.yml: |
  podSecurityContext:
    fsGroup: 1000950000
    runAsUser: 1000950000

  securityContext:
    capabilities:
      drop:
      - ALL
    runAsNonRoot: true
    runAsUser: 1000950000

