portal:
  enabled: true
  service:
    targetPort: 8000
  resources:
    requests:
      memory: 750Mi
  image:
      repository: quay.io/cdis/data-portal-prebuilt
      tag: caninedc.org-jawadqur-patch-1
  securityContext:
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000

requestor:
  enabled: false
  service:
    targetPort: 8000

revproxy:
  enabled: true
  nginx:
    resolver: "172.30.0.10"
    user: nginx
    pidFile: /tmp/nginx.pid 
  service:
    targetPort: 8000
  openshiftRoute:
    enabled: true
    annotations: {}
    host: "gen3.apps-crc.testing"
    path: "/"
    targetPort: "http"
    tls:
      termination: "edge"
      insecureEdgeTerminationPolicy: "Redirect"
    wildcardPolicy: "None"

  podSecurityContext: 
    fsGroup: 2000

  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000


