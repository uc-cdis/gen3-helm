apiVersion: v1
kind: Service
metadata:
  name: "requestor-service"
  labels:
    {{- include "requestor.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "requestor.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ include "common.nginxSidecar.targetPortName" . }}
      protocol: TCP
      name: {{ include "common.nginxSidecar.servicePortName" . }}
  type: {{ .Values.service.type }}