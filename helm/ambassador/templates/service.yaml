apiVersion: v1
kind: Service
metadata:
  name: ambassador-admin
  labels:
    service: ambassador-admin
spec:
  type: ClusterIP
  ports:
    - name: ambassador-admin
      port: 8877
      targetPort: 8877
  selector:
    {{- include "ambassador.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: ambassador
  name: ambassador-service
spec:
  ports:
    - port: {{ ternary 443 .Values.service.port (eq (include "common.nginxSidecar.servicePortName" .) "https") }}
      targetPort: {{ include "common.nginxSidecar.targetPortName" . }}
      protocol: TCP
      name: http  
  selector:
    {{- include "ambassador.selectorLabels" . | nindent 4 }}