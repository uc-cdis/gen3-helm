{{- if .Values.global.dev }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dev-postgres-ingress-netpolicy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dev-postgres-egress-netpolicy
spec:
  - namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: {{ .Release.Namespace }}
  - namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: {{ printf "workflow-pods-%s" .Release.Namespace }}
    podSelector:
      matchLabels:
        app: funnel-worker
  policyTypes:
    - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: postgresql
{{- end }}