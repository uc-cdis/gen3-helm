{{- if .Values.kernelPodTemplate.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.kernelPodTemplate.name }}
  namespace: {{ .Values.workspaceNamespace }}
  labels:
    app: enterprise-gateway
data:
  {{ .Values.kernelPodTemplate.fileName }}: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: "${kernel_id}"
      namespace: {{ .Values.workspaceNamespace }}
      labels:
        app: enterprise-gateway
        component: kernel
        kernel_id: "${kernel_id}"
        kernel_name: "${kernel_name}"
    spec:
      restartPolicy: Never
      containers:
        - name: kernel
          image: elyra/kernel-py:3.2.3
          env:
            - name: EG_RESPONSE_ADDRESS
              value: "${eg_response_address}"
            - name: KERNEL_ID
              value: "${kernel_id}"
            - name: KERNEL_NAME
              value: "${kernel_name}"
            - name: KERNEL_LANGUAGE
              value: "${kernel_language}"
          volumeMounts:
            - name: {{ .Values.kernelPodTemplate.volumeName }}
              mountPath: {{ .Values.kernelPodTemplate.workspaceMountPath }}
              mountPropagation: HostToContainer
{{- if .Values.kernelPodTemplate.sharedWorkspace.enabled }}
            - name: {{ .Values.kernelPodTemplate.sharedWorkspace.volumeName }}
              mountPath: {{ .Values.kernelPodTemplate.sharedWorkspace.mountPath }}
{{- end }}

        - name: {{ .Values.kernelPodTemplate.sidecar.name }}
          image: {{ .Values.kernelPodTemplate.sidecar.image | quote }}
          command:
{{ toYaml .Values.kernelPodTemplate.sidecar.command | indent 12 }}
          env:
            - name: NAMESPACE
              value: {{ default .Release.Namespace .Values.kernelPodTemplate.sidecar.namespace | quote }}
            - name: HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.kernelPodTemplate.sidecar.hostnameConfigMapName }}
                  key: {{ .Values.kernelPodTemplate.sidecar.hostnameConfigMapKey }}
                  optional: true
          resources:
{{ toYaml .Values.kernelPodTemplate.sidecar.resources | indent 12 }}
          securityContext:
            privileged: true
          volumeMounts:
            - name: {{ .Values.kernelPodTemplate.volumeName }}
              mountPath: {{ .Values.kernelPodTemplate.workspaceMountPath }}
              mountPropagation: Bidirectional

      volumes:
        - name: {{ .Values.kernelPodTemplate.volumeName }}
          persistentVolumeClaim:
            claimName: {{ "{{ ('claim-' ~ (kernel_username | lower | replace('@', '-40') | replace('.', '-2e'))) | tojson }}" }}
{{- if .Values.kernelPodTemplate.sharedWorkspace.enabled }}
        - name: {{ .Values.kernelPodTemplate.sharedWorkspace.volumeName }}
          persistentVolumeClaim:
            claimName: {{ .Values.kernelPodTemplate.sharedWorkspace.claimName | quote }}
{{- end }}
{{- end }}
