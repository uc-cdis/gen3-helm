{{- if .Values.kernelPodTemplate.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.kernelPodTemplate.name }}
  namespace: {{ .Values.workspaceNamespace }}
  labels:
    app: enterprise-gateway
data:
  {{ .Values.kernelPodTemplate.fileName }}: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: {{ "{{ kernel_pod_name | tojson }}" }}
      namespace: {{ "{{ kernel_namespace | tojson }}" }}
      labels:
        app: enterprise-gateway
        component: kernel
        kernel_id: {{ "{{ kernel_id | tojson }}" }}
        kernel_name: {{ "{{ kernel_name | tojson }}" }}
        source: kernel-pod.yaml
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      restartPolicy: Never
      serviceAccountName: {{ "{{ kernel_service_account_name | tojson }}" }}
      securityContext:
        runAsUser: {{ "{{ kernel_uid | int }}" }}
        runAsGroup: {{ "{{ kernel_gid | int }}" }}
        fsGroup: {{ "{{ kernel_gid | int }}" }}
      containers:
        - name: kernel
          image: {{ "{{ kernel_image | tojson }}" }}
          env:
            - name: KERNEL_ID
              value: {{ "{{ kernel_id | tojson }}" }}
            - name: KERNEL_NAME
              value: {{ "{{ kernel_name | tojson }}" }}
            - name: KERNEL_LANGUAGE
              value: {{ "{{ kernel_language | tojson }}" }}
            - name: KERNEL_NAMESPACE
              value: {{ "{{ kernel_namespace | tojson }}" }}
            - name: KERNEL_USERNAME
              value: {{ "{{ kernel_username | tojson }}" }}
          volumeMounts:
            - name: {{ .Values.kernelPodTemplate.volumeName }}
              mountPath: {{ .Values.kernelPodTemplate.workspaceMountPath }}
              mountPropagation: HostToContainer

        - name: {{ .Values.kernelPodTemplate.sidecar.name }}
          image: {{ .Values.kernelPodTemplate.sidecar.image | quote }}
          command:
{{ toYaml .Values.kernelPodTemplate.sidecar.command | indent 12 }}
          env:
            - name: NAMESPACE
              value: {{ default .Release.Namespace .Values.kernelPodTemplate.sidecar.namespace | quote }}
            - name: HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.kernelPodTemplate.sidecar.hostnameConfigMapName }}
                  key: {{ .Values.kernelPodTemplate.sidecar.hostnameConfigMapKey }}
                  optional: true
          resources:
{{ toYaml .Values.kernelPodTemplate.sidecar.resources | indent 12 }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            privileged: true
          volumeMounts:
            - name: {{ .Values.kernelPodTemplate.volumeName }}
              mountPath: /data
              mountPropagation: Bidirectional

      volumes:
        - name: {{ .Values.kernelPodTemplate.volumeName }}
          emptyDir: {}
{{- end }}
