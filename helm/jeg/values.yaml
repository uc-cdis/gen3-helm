# Jupyter Enterprise Gateway default values.
# Override via your environment's jeg-values.yaml

# Namespace where JEG pod runs AND where it launches kernel pods.
# CRITICAL: must match hatchery user-namespace and workspace-proxy workspaceNamespace.
workspaceNamespace: jupyter-pods

replicaCount: 1

image:
  repository: quay.io/cdis/gen3-vectis
  tag: qa-jeg
  pullPolicy: Always

env:
  EG_NAMESPACE: jupyter-pods
  EG_KERNEL_LAUNCH_TIMEOUT: "120"
  EG_MAX_KERNELS_PER_USER: "2"
  EG_CULL_IDLE_TIMEOUT: "14400"
  EG_CULL_CONNECTED: "True"
  EG_AUTH_TOKEN: ""
  EG_DEFAULT_KERNEL_NAME: python3
  EG_LIST_KERNELS: "True"
  EG_KERNEL_IMAGE_PULL_POLICY: IfNotPresent
  EG_SHARED_NAMESPACE: "False"
  EG_MIRROR_WORKING_DIRS: "False"
  EG_KERNEL_WHITELIST_ENVS: "ACCESS_TOKEN"  # propagate workspace token into kernel pods

# Optional kernel pod template used by Enterprise Gateway for all launched kernels.
# Enable this to inject a FUSE sidecar and shared workspace mount into kernel pods.
kernelPodTemplate:
  enabled: false
  name: jeg-kernel-pod-template
  fileName: kernel-pod.yaml.j2
  # Enterprise Gateway's kubernetes launcher reads this file directly.
  mountPath: /usr/local/share/jupyter/kernels/python_kubernetes/scripts/kernel-pod.yaml.j2
  workspaceMountPath: /home/jovyan/pd
  volumeName: workspace-data
  sidecar:
    name: gen3-fuse
    image: quay.io/cdis/gen3fuse-sidecar:master
    gen3Endpoint: ""
    wtsOverrideUrl: ""
    hostname: ""
    command:
      - /bin/bash
      - /sidecarDockerrun.sh
    namespace: ""
    hostnameConfigMapName: global
    hostnameConfigMapKey: hostname
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
