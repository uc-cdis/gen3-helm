apiVersion: v1
kind: Service
metadata:
  name: "gen3-user-data-library-service"
  labels:
    {{ include "gen3-user-data-library.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ include "common.nginxSidecar.targetPortName" . }}
      protocol: TCP
      name: {{ include "common.nginxSidecar.servicePortName" . }}
  selector:
    {{ include "gen3-user-data-library.selectorLabels" . | nindent 4 }}
