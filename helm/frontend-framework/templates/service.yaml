apiVersion: v1
kind: Service
metadata:
  name: "frontend-framework-service"
  labels:
    {{- include "frontend-framework.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ ternary 443 .Values.service.port (eq (include "common.nginxSidecar.servicePortName" .) "https") }}
      targetPort: {{ include "common.nginxSidecar.targetPortName" . }}
      protocol: TCP
      name: http  
    - protocol: TCP
      port: 443
      targetPort: {{ .Values.port }}
      name: https
  type: ClusterIP
  selector:
    {{- include "frontend-framework.selectorLabels" . | nindent 4 }}
