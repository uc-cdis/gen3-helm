{{- if .Values.global.nginxSidecar.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.global.nginxSidecar.tls.issuerRef.name }}
spec:
  ca:
    secretName: {{ .Values.global.nginxSidecar.tls.caSecretName }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gen3-internal-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: gen3 Internal CA
  secretName: {{ .Values.global.nginxSidecar.tls.caSecretName }}
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
{{- end }}