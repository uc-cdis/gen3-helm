apiVersion: v1
kind: Service
metadata:
  name: "gen3-analysis-service"
  labels:
    {{- include "gen3-analysis.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "gen3-analysis.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ ternary 443 .Values.service.port (eq (include "common.nginxSidecar.servicePortName" .) "https") }}
      targetPort: {{ include "common.nginxSidecar.targetPortName" . }}
      protocol: TCP
      name: {{ include "common.nginxSidecar.servicePortName" . }}
  type: {{ .Values.service.type }}