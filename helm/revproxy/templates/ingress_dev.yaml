{{- if and (eq .Values.global.dev true) (eq .Values.global.aws.enabled false) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: revproxy-dev
spec:
{{- if .Values.global.dev }}
  tls:
  - secretName: gen3-certs
    hosts:
      - {{ default .Values.global.hostname .Values.hostname | quote }} # <--- This maps the cert to the domain
  {{- end  }}
  rules:
    - host: {{ default .Values.global.hostname .Values.hostname | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: revproxy-service
                port:
                  number: 80
{{- end }}