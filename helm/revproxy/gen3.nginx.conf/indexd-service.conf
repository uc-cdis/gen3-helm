location /ga4gh/ {
    if ($csrf_check !~ ^ok-\S.+$) {
      return 403 "failed csrf check";
    }

    set $proxy_service  "indexd";
    set $upstream http://indexd-service$des_domain;

    proxy_pass $upstream;
    proxy_redirect http://$host/ https://$host/;
}

location /index/ {
    if ($csrf_check !~ ^ok-\S.+$) {
      return 403 "failed csrf check";
    }

    set $proxy_service  "indexd";
    set $upstream http://indexd-service$des_domain;

    rewrite ^/index/(.*) /$1 break;

    proxy_pass $upstream;
    proxy_redirect http://$host/ https://$host/index/;
}

