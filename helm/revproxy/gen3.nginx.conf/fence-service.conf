# AuthN-proxy uses fence to provide authentication to downstream services
# that don't implement our auth i.e. shiny, jupyter.
# Fence also sets the REMOTE_USER header to the username
# of the logged in user for later use
location /authn-proxy {
    internal;
    set $proxy_service  "fence";
    set $upstream_auth http://fence-service${des_domain}/user/anyaccess;
    proxy_pass $upstream_auth;
    proxy_pass_request_body off;
    proxy_set_header Authorization "$access_token";
    proxy_set_header Content-Length "";
    proxy_set_header X-Forwarded-For "$realip";
    proxy_set_header X-UserId "$userid";
    proxy_set_header   X-ReqId "$request_id";
    proxy_set_header   X-SessionId "$session_id";
    proxy_set_header   X-VisitorId "$visitor_id";

    # nginx bug that it checks even if request_body off
    client_max_body_size 0;
}

# Hits the fence API and stops the original request with a 403 if the provided
# token is blacklisted. Usage: `auth_request /block-denylisted-token;`
location /block-denylisted-token {
    internal;
    set $proxy_service "fence";
    error_page 400 =403 @block_blacklisted_token;
    error_page 500 =403 @block_blacklisted_token;
    # Previous versions of Fence that don't have the "/token/denylisted" endpoint return 405.
    # Returning 403 forces the deployment of a recent Fence for endpoints that require this check.
    error_page 405 =403 @block_blacklisted_token;

    proxy_pass http://fence-service${des_domain}/credentials/token/denylisted;
    proxy_method POST;
    proxy_pass_request_body off;
    proxy_set_header Authorization "$access_token";
    proxy_set_header Content-Length "0";
    proxy_set_header X-Forwarded-For "$realip";
    proxy_set_header X-UserId "$userid";
    proxy_set_header X-ReqId "$request_id";
    proxy_set_header X-SessionId "$session_id";
    proxy_set_header X-VisitorId "$visitor_id";
    proxy_set_header X-Original-URI $request_uri;

    # 4xx and 5xx errors return 403 (see `error_page` above)
    proxy_intercept_errors on;

    # nginx bug that it checks even if request_body off
    client_max_body_size 0;
}

location @block_blacklisted_token {
    internal;
    return 403 "unable to check if token is blacklisted";
}

location /user/credentials/token/denylisted {
    # Not meant to be called by users, 
    # but by the `auth_request /block-denylisted-token` location above.
    deny all;
}

location /user/ {
    if ($csrf_check !~ ^ok-\S.+$) {
      return 403 "failed csrf check";
    }

    set $proxy_service  "fence";
    proxy_read_timeout          400;
    proxy_send_timeout          400;
    proxy_connect_timeout       400;
    set $upstream http://fence-service$des_domain;
    rewrite ^/user/(.*) /$1 break;
    proxy_pass $upstream;
}

location /user/register {
    # Like /user/ but without CSRF check. Registration form submission is
    # incompatible with revproxy-level cookie-to-header CSRF check.
    # Fence enforces its own CSRF protection here so this is OK.
    set $proxy_service  "fence";
    set $upstream http://fence-service$des_domain;
    rewrite ^/user/(.*) /$1 break;
    proxy_pass $upstream;
}

location /user/data/download {
    if ($csrf_check !~ ^ok-\S.+$) {
      return 403 "failed csrf check";
    }

    set $proxy_service  "presigned-url-fence";
    set $upstream http://presigned-url-fence-service$des_domain;
    rewrite ^/user/(.*) /$1 break;
    proxy_pass $upstream;
}

location /user/metrics {
    deny all;
}

# OpenID Connect Discovery Endpoints
location /.well-known/ {
    if ($csrf_check !~ ^ok-\S.+$) {
      return 403 "failed csrf check";
    }

    set $proxy_service  "fence";
    set $upstream http://fence-service$des_domain;
    proxy_pass $upstream;
}