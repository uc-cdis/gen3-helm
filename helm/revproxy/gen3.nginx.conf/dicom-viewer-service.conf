location /dicom-viewer/ {
    if ($csrf_check !~ ^ok-\S.+$) {
      return 403 "failed csrf check";
    }

    set $proxy_service  "dicom-viewer";
    set $upstream {{ include "common.nginxSidecar.scheme" . }}://dicom-viewer-service.$namespace.svc.cluster.local;
    rewrite ^/dicom-viewer/(.*) /$1 break;
    proxy_pass $upstream;
}