apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.serviceName}}
  labels:
    {{- include "grip.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http

    - port: 8202
      targetPort: rpc
      protocol: TCP
      name: rpc
  selector:
    {{- include "grip.selectorLabels" . | nindent 4 }}

