{{- if .Values.global.crossplane.enabled }}
apiVersion: iam.aws.crossplane.io/v1beta1
kind: Role
metadata:
  name: "{{ .Values.global.environment }}-{{ .Release.Namespace }}-{{ include "gen3workflow.serviceAccountName" . }}"
spec:
  providerConfigRef:
    name: provider-aws
  forProvider:
    name: "{{ .Values.global.environment }}-{{ .Release.Namespace }}-{{ include "gen3workflow.serviceAccountName" . }}"
    description: "Role for gen3workflow service account for {{ .Values.global.environment }}-{{ .Release.Namespace }}"
    assumeRolePolicyDocument: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Effect": "Allow",
            "Principal": {
              "Service": "ec2.amazonaws.com"
            },
            "Action": "sts:AssumeRole"
          },
          {
            "Sid": "",
            "Effect": "Allow",
            "Principal": {
              "Federated": "arn:aws:iam::{{ .Values.global.crossplane.accountId }}:oidc-provider/{{ .Values.global.crossplane.oidcProviderUrl }}"
            },
            "Action": "sts:AssumeRoleWithWebIdentity",
            "Condition": {
              "StringEquals": {
                "{{ .Values.global.crossplane.oidcProviderUrl }}:aud": "sts.amazonaws.com",
                "{{ .Values.global.crossplane.oidcProviderUrl }}:sub": "system:serviceaccount:{{ .Release.Namespace }}:{{ include "gen3workflow.serviceAccountName" . }}"
              }
            }
          }
        ]
      }
---
apiVersion: iam.aws.crossplane.io/v1beta1
kind: Policy
metadata:
  name: "{{ .Values.global.environment }}-{{ .Release.Namespace }}-gen3-workflow-policy"
spec:
  providerConfigRef:
    name: provider-aws
  forProvider:
    name: "{{ .Values.global.environment }}-{{ .Release.Namespace }}-gen3-workflow-policy"
    document: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Sid": "ManageS3Buckets",
            "Effect": "Allow",
            "Action": [
              "s3:CreateBucket",
              "s3:DeleteBucket",
              "s3:ListBucket",
              "s3:GetObject",
              "s3:PutObject",
              "s3:DeleteObject",
              "s3:AbortMultipartUpload",
              "s3:DeleteBucketPolicy",
              "s3:GetEncryptionConfiguration",
              "s3:PutEncryptionConfiguration",
              "s3:GetBucketPolicy",
              "s3:PutBucketPolicy",
              "s3:PutLifecycleConfiguration",
              "s3:GetBucketVersioning",
              "s3:PutBucketVersioning",
              "s3:"DeleteObjectVersion",
              "s3:GetBucketNotification",
              "s3:PutBucketNotification"
            ],
            "Resource": [
              "arn:aws:s3:::gen3wf-*",
              "arn:aws:s3:::gen3wf-*/*"
            ]
          },
          {
            "Sid": "GetIamRoles",
            "Effect": "Allow",
            "Action": [
                "iam:CreateRole",
                "iam:CreatePolicy",
                "iam:PutRolePolicy",
                "iam:GetRole",
                "iam:GetRolePolicy",
                "iam:TagRole",
                "iam:UpdateAssumeRolePolicy"
            ],
            "Resource": [
                "arn:aws:iam::*:role/gen3wf-*",
                "arn:aws:iam::*:policy/gen3wf-*"
            ]
          },
          {
            "Sid": "GetCallerIdentity",
            "Effect": "Allow",
            "Action": [
              "sts:GetCallerIdentity"
            ],
            "Resource": "*"
          },
          {
            "Sid": "GetClusterInfo",
            "Effect": "Allow",
            "Action": [
              "eks:DescribeCluster"
            ],
            "Resource": "arn:aws:eks:*:{{ .Values.global.crossplane.accountId }}:cluster/{{ .Values.global.clusterName }}"
          },
          {
            "Sid": "ManageKMS",
            "Effect": "Allow",
            "Action": [
              "kms:CreateKey",
              "kms:GenerateDataKey",
              "kms:CreateAlias",
              "kms:DescribeKey",
              "kms:Encrypt",
              "kms:Decrypt",
              "kms:TagResource"
            ],
            "Resource": "*"
          },
          {
            "Sid": "AllowPassRoleToS3FilesService",
            "Effect": "Allow",
            "Action": "iam:PassRole",
            "Resource": "arn:aws:iam::{{ .Values.global.crossplane.accountId }}:role/gen3wf-*-s3files-role",
            "Condition": {
                "StringEquals": {
                    "iam:PassedToService": "elasticfilesystem.amazonaws.com"
                }
            }
          },
          {
            "Sid": "S3FilesSystemAndMountManagement",
            "Effect": "Allow",
            "Action": [
                "s3files:CreateFileSystem",
                "s3files:GetFileSystem",
                "s3files:CreateMountTarget",
                "s3files:ListFileSystems",
                "s3files:TagResource",
                "s3files:ListMountTargets"
            ],
            "Resource": "*"
          },
          {
            "Sid": "EC2NetworkDiscoveryAndSecurityControlForS3Files",
            "Effect": "Allow",
            "Action": [
                "ec2:DescribeSecurityGroups",
                "ec2:DescribeSubnets",
                "ec2:DescribeTags",
                "ec2:CreateSecurityGroup",
                "ec2:AuthorizeSecurityGroupIngress",
                "ec2:AuthorizeSecurityGroupEgress",
                "ec2:CreateNetworkInterface",
                "ec2:DeleteNetworkInterface",
                "ec2:DescribeNetworkInterfaces",
                "ec2:DescribeSubnets",
                "ec2:DescribeSecurityGroups",
                "ec2:DescribeVpcs"
            ],
            "Resource": "*"
          },
          {
            "Sid": "AddEventBridgeRulesForS3Files",
            "Effect": "Allow",
            "Action": [
              "events:ListRules",
              "events:PutRule",
              "events:PutTargets",
              "events:DescribeRule",
              "events:ListTargetsByRule"
            ],
            "Resource": "arn:aws:events:*:{{ .Values.global.crossplane.accountId }}:rule/*"
          },
        ]
      }
---
apiVersion: iam.aws.crossplane.io/v1beta1
kind: RolePolicyAttachment
metadata:
  name: "{{ include "gen3workflow.serviceAccountName" . }}-{{ .Release.Namespace }}-managed-policy-attachment"
spec:
  providerConfigRef:
    name: provider-aws
  forProvider:
    roleName: "{{ .Values.global.environment }}-{{ .Release.Namespace }}-{{ include "gen3workflow.serviceAccountName" . }}"
    policyArnRef:
      name: "{{ .Values.global.environment }}-{{ .Release.Namespace }}-gen3-workflow-policy"
{{- end }}