{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workspace-proxy
  namespace: {{ .Values.deploymentNamespace }}
  labels:
    app: workspace-proxy
spec:
  podSelector:
    matchLabels:
      app: workspace-proxy
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.deploymentNamespace }}
          podSelector:
            matchLabels:
              app: revproxy
      ports:
        - protocol: TCP
          port: 8080

  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.workspaceNamespace }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8888
    {{- range .Values.kubernetesApiServerCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
{{- end }}
