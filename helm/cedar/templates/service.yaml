---
apiVersion: v1
kind: Service
metadata:
  name: cedar-wrapper-service
  labels:
    {{- include "cedar.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "cedar.selectorLabels" . | nindent 6 }}
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ include "common.nginxSidecar.targetPortName" . }}
      protocol: TCP
      name: {{ include "common.nginxSidecar.servicePortName" . }}
      nodePort: null
    - protocol: TCP
      port: {{ .Values.service.httpsPort }}
      targetPort: {{ .Values.service.targetPort }}
      name: https
      nodePort: null