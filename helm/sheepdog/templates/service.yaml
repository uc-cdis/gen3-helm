apiVersion: v1
kind: Service
metadata:
  name: "sheepdog-service"
  labels:
    {{- include "sheepdog.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ ternary 443 .Values.service.port (eq (include "common.nginxSidecar.servicePortName" .) "https") }}
      targetPort: {{ include "common.nginxSidecar.targetPortName" . }}
      protocol: TCP
      name: http
  selector:
    {{- include "sheepdog.selectorLabels" . | nindent 4 }}
