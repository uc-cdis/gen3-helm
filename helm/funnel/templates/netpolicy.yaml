{{ include "common.db_netpolicy" . }}

---

{{ include "common.ingress_netpolicy" . }}

---

{{ include "common.egress_netpolicy" . }}


{{ if .Values.global.netPolicy.enabled }}

{{- $jobsNamespace := printf "workflow-pods-%s" .Release.Namespace -}}

---

# Do not allow any traffic to or from pods unless explicitly allowed by the other policies in the jobs namespace
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-nothing-netpolicy
  namespace: {{ $jobsNamespace }}
spec:
  policyTypes:
  - Ingress
  - Egress
  podSelector: {}
  ingress: []
  egress: []


---
# Gen3-workflow needs to allow ingress and egress from funnel workers in $jobsNamespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gen3-workflow-ingress-from-funnel-worker
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: gen3-workflow
  policyTypes:
    - Ingress
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: {{ $jobsNamespace }}
        podSelector:
          matchLabels:
            app: funnel-worker
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: funnel-worker-egress-policy
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - gen3-workflow
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ $jobsNamespace }}
      podSelector:
        matchLabels:
          app: funnel-worker
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: funnel-worker-egress-to-gen3workflow
  namespace: {{ $jobsNamespace }}
spec:
  podSelector:
    matchLabels:
      app: funnel-worker
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }}
      podSelector:
        matchExpressions:
          - key: app
            operator: In
            values:
              - gen3-workflow
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: funnel-worker-ingress
  namespace: {{ $jobsNamespace }}
spec:
  podSelector:
    matchLabels:
      app: funnel-worker
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }}
      podSelector:
        matchExpressions:
          - key: app
            operator: In
            values:
              - gen3-workflow
---
# Funnel needs to be able to access the Kube API to launch jobs in a different namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: funnel-to-kubeapi-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: funnel
  policyTypes:
  - Egress
  egress:
  # Allow access to the Kubernetes API server in kube-system
  - to: []
    ports:
      - protocol: TCP
        port: 443
---
# Funnel workers need to be able to access
# the Kube API to create executor pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: funnel-worker-to-kubeapi-egress
  namespace: {{ $jobsNamespace }}
spec:
  podSelector:
    matchLabels:
      app: funnel-worker
  egress:
    {{- if .Values.global.kubeapi_endpoints.enabled }}
    - to:
      {{- range .Values.global.kubeapi_endpoints.ip }}
      - ipBlock:
          cidr: {{ . }}/16
      {{- end }}
    {{- else }}
      # Regular (non-argo) helm installations can perform a lookup to get the kubeapi endpoints and allow access to those
      {{- range (lookup "v1" "Endpoints" "default" "kubernetes").subsets }} 
    - to:
        {{- range .addresses }}
        - ipBlock:
            cidr: {{ .ip }}/16
        {{- end }}
      {{- end }}
    {{- end }}
      ports:
      - protocol: TCP
        port: 443  # Kubernetes API
  policyTypes:
    - Egress

---
# Funnel pods need to be able to access DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: funnel-pods-to-dns-egress
  namespace: {{ $jobsNamespace }}
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - funnel-executor
          - funnel-worker
  egress:
    - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
        podSelector:
          matchExpressions:
            - key: k8s-app
              operator: In
              values:
                - kube-dns
      ports:
      - protocol: UDP
        port: 53
      - protocol: TCP
        port: 53
  policyTypes:
    - Egress

--- 
# Funnel workers need to be able to access the database
# which would be a local postgresql instance in dev 
# and the database subnets that reach AWS RDS in prod
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: funnel-worker-db-netpolicy
  namespace: {{ $jobsNamespace }}
spec:
  egress:
  {{- if .Values.global.dev }}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }}
      podSelector:
        matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
              - "postgresql"
  {{- else }}
  {{- range .Values.global.netPolicy.dbSubnets }}
  - to:
    - ipBlock:
        cidr: {{ . }}
  {{- end }}
  {{- end }}
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - funnel-worker
  policyTypes:
  - Egress

---

# Add egress to internet for funnel pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-egress-netpolicy
  namespace: {{ $jobsNamespace}}
spec:
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        # Private IP ranges that should not be accessed by funnel pods
        - 169.254.0.0/16
        - 172.16.0.0/12
        - 10.0.0.0/8
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - funnel-worker
          - funnel-executor
  policyTypes:
  - Egress

{{- end }}

