apiVersion: v1
kind: PersistentVolume
metadata:
  name: funnel-worker-pv-{{`{{.TaskId}}`}}
  labels:
    app: funnel
    taskId: {{`{{.TaskId}}`}}
    namespace: {{`{{.Namespace}}`}}
spec:
  storageClassName: "" # Required for static provisioning
  capacity: # Note: capacity is effectively elastic and only serves as a placeholder
    storage: "10Mi"
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - tls
    {{- if eq .Values.storage.type "mountpoint_s3" }}
    - allow-delete
    - allow-overwrite # allow overwriting existing files
    - incremental-upload # allow appending to existing files
    - allow-other # allow non-root users to access the mounted directory
    - region={{`{{.Region}}`}}
    - file-mode=0755
    - prefix=funnel-temp-files/
    {{- end }}
    {{- if eq .Values.storage.type "s3files" }}
    - noresvport
    {{- end }}
    {{`{{- if .KmsKeyID}}`}}
    - sse aws:kms
    - sse-kms-key-id={{`{{.KmsKeyID}}`}}
    {{`{{- end}}`}}
    {{- if .Values.endpoint_url }}
    - endpoint-url={{ .Values.endpoint_url }}
    # https://github.com/awslabs/mountpoint-s3/blob/v1.22.2/doc/TROUBLESHOOTING.md#invalid-hostname-for-dns-resolution
    - force-path-style
    {{- end }}
  csi:
    {{- if eq .Values.storage.type "mountpoint_s3" }}
    driver: s3.csi.aws.com
    volumeHandle: s3-csi-{{`{{.TaskId}}`}}
    volumeAttributes:
      bucketName: {{`{{.Bucket}}`}}
      {{- if .Values.authenticationSource }}
      authenticationSource: {{ .Values.authenticationSource }}
      stsRegion: {{ .Values.stsRegion }}
      {{- end }}
    {{- end }}
    {{- if eq .Values.storage.type "s3files" }}
    driver: efs.csi.aws.com
    volumeHandle: s3files:{{`{{.S3FilesystemId}}`}}
    volumeAttributes:
      encryptInTransit: "true"
    {{- end }}
  claimRef:
    namespace: {{`{{.Namespace}}`}}
    name: funnel-worker-pvc-{{`{{.TaskId}}`}}