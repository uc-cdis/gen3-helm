{{- if .Values.searchAuthProxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.searchAuthProxy.serviceName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.searchAuthProxy.serviceName }}
spec:
  replicas: {{ .Values.searchAuthProxy.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.searchAuthProxy.serviceName }}
  template:
    metadata:
      labels:
        app: {{ .Values.searchAuthProxy.serviceName }}
    spec:
      serviceAccountName: {{ .Values.searchAuthProxy.serviceAccount.name }}
      {{- if .Values.searchAuthProxy.hostAliases }}
      hostAliases:
        {{- toYaml .Values.searchAuthProxy.hostAliases | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.searchAuthProxy.serviceName }}
          image: "{{ .Values.searchAuthProxy.image.repository }}:{{ .Values.searchAuthProxy.image.tag }}"
          imagePullPolicy: {{ .Values.searchAuthProxy.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: SEARCH_API_BASE
              value: "https://{{ .Values.searchAuthProxy.apiGateway.apiId }}.execute-api.{{ .Values.searchAuthProxy.apiGateway.region }}.amazonaws.com/search"
            - name: SIEM_SEARCH_BASE
              value: {{ default (printf "https://%s.execute-api.%s.amazonaws.com/search" .Values.searchAuthProxy.apiGateway.apiId .Values.searchAuthProxy.apiGateway.region) .Values.searchAuthProxy.siemBackend.baseUrl | quote }}
            - name: SEARCH_API_REQUIRE_SIGV4
              value: {{ .Values.searchAuthProxy.siemBackend.searchApiRequireSigv4 | quote }}
            {{- if .Values.searchAuthProxy.env.SEARCH_API_TLS_VERIFY }}
            - name: SEARCH_API_TLS_VERIFY
              value: {{ .Values.searchAuthProxy.env.SEARCH_API_TLS_VERIFY | quote }}
            {{- end }}
            - name: SIEM_SEARCH_REQUIRE_SIGV4
              value: {{ .Values.searchAuthProxy.siemBackend.siemRequireSigv4 | quote }}
            - name: SIEM_INDEXES
              value: {{ .Values.searchAuthProxy.siemBackend.indexes | quote }}
            - name: ARBORIST_URL
              value: "http://arborist-service.{{ .Release.Namespace }}.svc.cluster.local"
            - name: SEARCH_PROXY_DEFAULT_LIMIT
              value: {{ .Values.searchAuthProxy.env.SEARCH_PROXY_DEFAULT_LIMIT | quote }}
            - name: SEARCH_PROXY_MAX_LIMIT
              value: {{ .Values.searchAuthProxy.env.SEARCH_PROXY_MAX_LIMIT | quote }}
            {{- if .Values.searchAuthProxy.snapshotsBucket }}
            - name: SNAPSHOTS_BUCKET
              value: {{ .Values.searchAuthProxy.snapshotsBucket | quote }}
            {{- end }}
            {{- if .Values.searchAuthProxy.snapshotsKeyPrefix }}
            - name: SNAPSHOTS_KEY_PREFIX
              value: {{ .Values.searchAuthProxy.snapshotsKeyPrefix | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.searchAuthProxy.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.searchAuthProxy.serviceName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.searchAuthProxy.serviceName }}
spec:
  selector:
    app: {{ .Values.searchAuthProxy.serviceName }}
  ports:
    - name: http
      port: 8000
      targetPort: 8000
{{- end }}
