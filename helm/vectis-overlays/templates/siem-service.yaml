{{- if .Values.siemService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: siem-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: siem-service
spec:
  replicas: {{ .Values.siemService.replicaCount }}
  selector:
    matchLabels:
      app: siem-service
  template:
    metadata:
      labels:
        app: siem-service
    spec:
      serviceAccountName: {{ .Values.siemService.serviceAccount.name }}
      containers:
        - name: siem-service
          image: "{{ .Values.siemService.image.repository }}:{{ .Values.siemService.image.tag }}"
          imagePullPolicy: {{ .Values.siemService.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: ARBORIST_URL
              value: "http://arborist-service.{{ .Release.Namespace }}.svc.cluster.local"
            - name: SIEM_DEFAULT_LIMIT
              value: {{ .Values.siemService.env.SIEM_DEFAULT_LIMIT | quote }}
            - name: SIEM_MAX_LIMIT
              value: {{ .Values.siemService.env.SIEM_MAX_LIMIT | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vectis-search-auth-proxy
                  key: postgres_dsn
            - name: DB_SCHEMA
              value: {{ .Values.siemService.env.DB_SCHEMA | default "vectis_ingestion" | quote }}
            - name: SIEM_BACKEND
              value: {{ .Values.siemService.env.SIEM_BACKEND | default "postgres" | quote }}
            - name: SIEM_INDEX_BACKENDS
              value: {{ .Values.siemService.env.SIEM_INDEX_BACKENDS | default "" | quote }}
          readinessProbe:
            httpGet:
              path: /siem/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /siem/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.siemService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: siem-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: siem-service
spec:
  selector:
    app: siem-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
{{- end }}
