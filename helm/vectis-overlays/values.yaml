# vectis-overlays default values.
# All service-internal URLs use .Release.Namespace so the chart is env-agnostic.
# Override image tags per-environment in gitops values.

guppyCompat:
  enabled: true
  replicaCount: 1
  serviceAccount:
    create: true
    name: guppy-compat-service
    annotations: {}
  image:
    repository: quay.io/cdis/gen3-vectis
    tag: guppy-compat-v1
    pullPolicy: Always
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    GUPPY_COMPAT_MAX_LIMIT: "5000"

siemService:
  enabled: true
  replicaCount: 1
  serviceAccount:
    create: true
    name: siem-service
    annotations: {}
  image:
    repository: quay.io/cdis/gen3-vectis
    tag: siem-service-v1
    pullPolicy: Always
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    SIEM_DEFAULT_LIMIT: "250"
    SIEM_MAX_LIMIT: "2000"

searchAuthProxy:
  enabled: true
  replicaCount: 1
  serviceName: search-auth-proxy
  serviceAccount:
    create: true
    name: search-auth-proxy
    annotations: {}
  image:
    repository: quay.io/cdis/gen3-vectis
    tag: search-auth-proxy-v1
    pullPolicy: Always
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    SEARCH_PROXY_DEFAULT_LIMIT: "50"
    SEARCH_PROXY_MAX_LIMIT: "1000"
  apiGateway:
    apiId: ""
    region: "us-east-1"
  postgresDsnSecretRef:
    name: vectis-search-auth-proxy
    key: postgres_dsn
  # Optional separate AWS secret name for the search-role credentials.
  # Falls back to rds.secretName for backward compatibility.
  appDsnSecretName: ""

# CDK RDS secret in Secrets Manager — used to build the postgres DSN ExternalSecret.
# Set per-environment in gitops values.
rds:
  secretName: ""
  endpoint: ""
  port: "5432"
  database: postgres

# Database migrations — one-time Job to bootstrap the vectis schema and RLS views.
# Set migrations.enabled: true in gitops values to trigger the Job, then flip back to false.
migrations:
  enabled: false
