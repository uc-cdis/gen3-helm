# Default values for zendesk-wrapper.

global:
  environment: default
  pdb: false
  minAvailable: 1
  netPolicy:
    enabled: false
    dbSubnet: ""
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    averageCPUValue: 500m
    averageMemoryValue: 500Mi
  topologySpread:
    enabled: false
    topologyKey: "topology.kubernetes.io/zone"
    maxSkew: 1

autoscaling: {}

metricsEnabled:

podAnnotations: {"gen3.io/network-ingress": "zendesk-wrapper"}

replicaCount: 1

revisionHistoryLimit: 2

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - zendesk-wrapper
          topologyKey: "kubernetes.io/hostname"

image:
  repository: quay.io/cdis/zendesk-wrapper-service
  pullPolicy: Always
  tag: ""

resources:
  limits:
    memory: 128Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

netPolicy:
  ingressApps:
    - zendesk-wrapper
  egressApps:
    - zendesk-wrapper

# -- (map) Environment variables for the Zendesk wrapper service
env:
  # -- (string) Zendesk instance URL (e.g., https://gen3support.zendesk.com)
  GEN3_ZENDESK_URL: ""
  # -- (string) Email of the agent account used with the API token
  ZENDESK_API_EMAIL: ""

# -- (map) Secret environment variables (referenced from Kubernetes secrets)
externalSecrets:
  # -- (string) Name of the Kubernetes secret containing the Zendesk API token
  name: "zendesk-wrapper-secret"
  # -- (string) Key within the secret for the API token
  tokenKey: "ZENDESK_API_TOKEN"
   # -- (string) Email of the agent account used with the API token 
  apiEmail: "ZENDESK_API_EMAIL"

release: "production"
criticalService: "false"
partOf: "Core-Service"
selectorLabels:
commonLabels:
