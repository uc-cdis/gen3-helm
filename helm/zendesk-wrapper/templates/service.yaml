apiVersion: v1
kind: Service
metadata:
  name: "zendesk-wrapper-service"
  labels:
    {{- include "zendesk-wrapper.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "zendesk-wrapper.selectorLabels" . | nindent 4 }}
