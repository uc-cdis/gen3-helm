apiVersion: v1
kind: Service
metadata:
  name: "orthanc-service"
  labels:
    {{- include "orthanc.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ ternary 443 .Values.service.port (eq (include "common.nginxSidecar.servicePortName" .) "https") }}
      targetPort: {{ include "common.nginxSidecar.targetPortName" . }}
      protocol: TCP
      name: http
      nodePort: null
  type: ClusterIP
  selector:
    {{- include "orthanc.selectorLabels" . | nindent 4 }}
