{{- if and (.Values.global.crossplane.enabled) (.Values.portalBuild.enabled) }}
apiVersion: iam.aws.crossplane.io/v1beta1
kind: Role
metadata:
  name: "{{ .Values.global.environment }}-{{ .Release.Namespace }}-{{ include "portal.serviceAccountName" . }}"
spec:
  providerConfigRef:
    name: provider-aws
  forProvider:
    name: "{{ .Values.global.environment }}-{{ .Release.Namespace }}-{{ include "portal.serviceAccountName" . }}"
    description: "Role for portal service account for {{ .Values.global.environment }}"
    assumeRolePolicyDocument: |
      {
        "Version":"2012-10-17",
        "Statement":[
          { "Effect":"Allow","Principal":{"Service":"ec2.amazonaws.com"},"Action":"sts:AssumeRole" },
          {
            "Sid":"",
            "Effect":"Allow",
            "Principal":{"Federated":"arn:aws:iam::{{ .Values.global.crossplane.accountId }}:oidc-provider/{{ .Values.global.crossplane.oidcProviderUrl }}"},
            "Action":"sts:AssumeRoleWithWebIdentity",
            "Condition":{
              "StringEquals":{
                "{{ .Values.global.crossplane.oidcProviderUrl }}:sub":"system:serviceaccount:{{ .Release.Namespace }}:{{ include "portal.serviceAccountName" . }}",
                "{{ .Values.global.crossplane.oidcProviderUrl }}:aud":"sts.amazonaws.com"
              }
            }
          }
        ]
      }
---
apiVersion: iam.aws.crossplane.io/v1beta1
kind: Policy
metadata:
  name: "{{ .Values.global.environment }}-{{ .Release.Namespace }}-portal-role-policy"
spec:
  providerConfigRef:
    name: provider-aws
  forProvider:
    roleName: "{{ .Values.global.environment }}-{{ .Release.Namespace }}-{{ include "portal.serviceAccountName" . }}"
    name: "{{ .Values.global.environment }}-{{ .Release.Namespace }}-portal-role-policy"
    document: |
      {
        "Version":"2012-10-17",
        "Statement":[
          {
            "Effect":"Allow",
            "Action":["s3:List*","s3:Get*"],
            "Resource":[
              "arn:aws:s3:::{{ .Values.portalBuild.s3csi.bucketName | default (printf "%s-%s-portal-bucket" .Values.global.environment .Release.Namespace) }}/*",
              "arn:aws:s3:::{{ .Values.portalBuild.s3csi.bucketName | default (printf "%s-%s-portal-bucket" .Values.global.environment .Release.Namespace) }}"
            ]
          },
          {
            "Effect":"Allow",
            "Action":["s3:PutObject","s3:GetObject","s3:DeleteObject"],
            "Resource":"arn:aws:s3:::{{ .Values.portalBuild.s3csi.bucketName | default (printf "%s-%s-portal-bucket" .Values.global.environment .Release.Namespace) }}/*"
          }
        ]
      }

---
apiVersion: iam.aws.crossplane.io/v1beta1
kind: RolePolicyAttachment
metadata:
  name: "{{ .Values.global.environment }}-portal-sa-managed-policy-attachment
spec:
  providerConfigRef:
    name: provider-aws
  forProvider:
    roleName: "{{ .Values.global.environment }}-{{ .Release.Namespace }}-{{ include "portal.serviceAccountName" . }}"
    policyArnRef: 
      name: "{{ .Values.global.environment }}-{{ .Release.Namespace }}-portal-role-policy"
---
apiVersion: s3.aws.crossplane.io/v1beta1
kind: Bucket
metadata:
  name: "{{ .Values.portalBuild.s3csi.bucketName | default (printf "%s-%s-portal-bucket" .Values.global.environment .Release.Namespace) }}"
spec:
  providerConfigRef:
    name: provider-aws
  forProvider:
    bucketName: "{{ .Values.portalBuild.s3csi.bucketName | default (printf "%s-%s-portal-bucket" .Values.global.environment .Release.Namespace) }}"
    acl: private
    forceDestroy: false
    locationConstraint: {{ .Values.global.aws.region }}
    tags:
      Organization: gen3
      description: Created by crossplane
    versioningConfiguration:
      {{- if .Values.global.crossplane.s3.versioningEnabled }}
      status: "Enabled"
      {{- end }}
    serverSideEncryptionConfiguration:
      rules:
        - applyServerSideEncryptionByDefault:
            {{- if .Values.portalBuild.s3csi.kmsKeyId }}
            sseAlgorithm: aws:kms
            kmsMasterKeyID: {{ .Values.portalBuild.s3csi.kmsKeyId }}
            {{- else if .Values.global.crossplane.s3.kmsKeyId }}
            sseAlgorithm: aws:kms
            kmsMasterKeyID: {{ .Values.global.crossplane.s3.kmsKeyId }}
            {{- else }}
            sseAlgorithm: AES256
            {{- end }}
{{- end}}            